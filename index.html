    .hero-background::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg,
          rgba(255,255,255,.12) 0%,
          rgba(255,255,255,.04) 43%,
          rgba(8,22,38,.24) 100%),
        radial-gradient(circle at center,
          rgba(255,247,232,.10) 0%,
          rgba(7,19,35,.08) 78%);
      pointer-events: none;
    }

    .hero-background::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg,
          rgba(7,19,35,.13) 0%,
          rgba(255,255,255,.02) 48%,
          rgba(7,19,35,.08) 100%);
      pointer-events: none;
    }

    .page {
      width: min(1536px, 100%);
      margin: 0 auto;
      padding-bottom: 26px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(460px, 1fr) auto;
      align-items: center;
      min-height: 156px;
      overflow: hidden;
      border-radius: 0 0 30px 30px;
      border-bottom: 2px solid var(--red);
      background:
        linear-gradient(90deg,
          rgba(7,19,37,.98) 0%,
          rgba(18,34,55,.94) 52%,
          rgba(245,248,252,.93) 76%,
          rgba(238,244,251,.95) 100%);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
    }

    .portal-title {
      padding: 30px 48px;
      color: white;
    }

    .portal-title h1 {
      margin: 0;
      font-size: clamp(2.2rem, 4vw, 3.65rem);
      line-height: 1;
      letter-spacing: -.045em;
    }

    .portal-title p {
      margin: 13px 0 0;
      color: rgba(255,255,255,.77);
      font-size: clamp(1rem, 1.6vw, 1.25rem);
    }

    .company-logos {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 28px;
      padding: 24px 42px;
      min-width: 530px;
    }

    .company-logos img {
      display: block;
      width: auto;
      height: 72px;
      object-fit: contain;
    }

    .company-logos .madic { max-width: 275px; }
    .company-logos .espic { max-width: 260px; }

    .logo-divider {
      width: 1px;
      height: 78px;
      background: rgba(11,23,48,.28);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(250px, .75fr) minmax(380px, 2fr) auto auto;
      align-items: center;
      gap: 16px;
      width: min(1300px, calc(100% - 42px));
      margin: 58px auto 28px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,.66);
      border-radius: 22px;
      background: rgba(255,255,255,.80);
      backdrop-filter: blur(22px);
      box-shadow: var(--shadow);
    }

    .field {
      position: relative;
    }

    .field svg {
      position: absolute;
      left: 18px;
      top: 50%;
      width: 22px;
      height: 22px;
      transform: translateY(-50%);
      color: #334056;
      pointer-events: none;
    }

    select, input, button {
      min-height: 60px;
      border-radius: 13px;
      font: inherit;
    }

    select, input {
      width: 100%;
      color: var(--ink);
      border: 1px solid rgba(11,23,48,.14);
      background: rgba(255,255,255,.97);
      outline: none;
      box-shadow: 0 6px 14px rgba(16,31,52,.07);
    }

    select {
      padding: 0 46px 0 52px;
      appearance: none;
      cursor: pointer;
      font-weight: 650;
    }

    input {
      padding: 0 18px 0 54px;
    }

    input::placeholder { color: #7a8597; }

    select:focus, input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 4px rgba(223,0,43,.11);
    }

    button {
      border: 0;
      padding: 0 25px;
      font-weight: 850;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    button:hover { transform: translateY(-2px); }
    button:active { transform: translateY(0); }

    .btn-search {
      min-width: 145px;
      color: white;
      background: linear-gradient(135deg, var(--red), #ef2348);
      box-shadow: 0 12px 25px rgba(223,0,43,.24);
    }

    .btn-search:hover {
      background: linear-gradient(135deg, var(--red-dark), var(--red));
    }

    .btn-all {
      min-width: 160px;
      color: var(--ink);
      background: rgba(255,255,255,.97);
      box-shadow: 0 8px 18px rgba(16,31,52,.10);
    }

    .count-pill {
      width: fit-content;
      margin: 0 0 24px max(70px, calc((100% - 1395px) / 2));
      padding: 13px 18px;
      color: white;
      border: 1px solid rgba(255,255,255,.20);
      border-radius: 14px;
      background: rgba(7,19,37,.78);
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 28px rgba(4,14,28,.22);
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(285px, 1fr));
      gap: 18px;
      width: min(1395px, calc(100% - 42px));
      margin: 0 auto;
    }

    .station-card {
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 22px;
      color: var(--ink);
      text-decoration: none;
      border: 1px solid rgba(255,255,255,.82);
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(255,255,255,.97), rgba(247,249,252,.94));
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 34px rgba(3,13,27,.23);
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      animation: reveal .42s ease both;
    }

    .station-card:hover {
      transform: translateY(-6px);
      border-color: rgba(223,0,43,.35);
      box-shadow: 0 26px 46px rgba(3,13,27,.31);
    }

    .station-card:focus-visible {
      outline: 3px solid var(--red);
      outline-offset: 4px;
    }

    .station-head {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 16px;
      align-items: start;
    }

    .station-icon {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: white;
      background: linear-gradient(145deg, var(--red), #f32149);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.25),
        0 9px 18px rgba(223,0,43,.18);
    }

    .station-icon svg {
      width: 29px;
      height: 29px;
    }

    .station-card h2 {
      margin: 2px 0 10px;
      font-size: 1.12rem;
      line-height: 1.25;
    }

    .location {
      display: grid;
      gap: 7px;
      color: #39475c;
      font-size: .94rem;
    }

    .location span {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .location svg {
      width: 15px;
      height: 15px;
      flex: 0 0 auto;
    }

    .station-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      margin-top: 24px;
    }

    .tag {
      max-width: 68%;
      padding: 7px 11px;
      overflow: hidden;
      color: var(--red-dark);
      font-size: .78rem;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-radius: 8px;
      background: rgba(223,0,43,.10);
    }

    .open {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--red);
      font-weight: 850;
      white-space: nowrap;
    }

    .open svg {
      width: 16px;
      height: 16px;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 42px 20px;
      color: white;
      text-align: center;
      border: 1px dashed rgba(255,255,255,.38);
      border-radius: 18px;
      background: rgba(7,19,37,.72);
      backdrop-filter: blur(14px);
    }

    .benefits {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      width: min(1490px, calc(100% - 16px));
      margin: 34px auto 0;
      overflow: hidden;
      color: white;
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 26px;
      background: rgba(7,19,37,.84);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .benefit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      min-height: 114px;
      padding: 20px 24px;
      border-right: 1px solid rgba(255,255,255,.15);
    }

    .benefit:last-child { border-right: 0; }

    .benefit-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      color: var(--red);
    }

    .benefit-icon svg {
      width: 43px;
      height: 43px;
    }

    .benefit strong {
      display: block;
      margin-bottom: 5px;
      font-size: 1rem;
    }

    .benefit small {
      color: rgba(255,255,255,.68);
      font-size: .84rem;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1100px) {
      .topbar {
        grid-template-columns: 1fr;
        background: linear-gradient(180deg, rgba(7,19,37,.98) 0 58%, rgba(245,248,252,.95) 58%);
      }

      .company-logos {
        justify-content: center;
        min-width: 0;
      }

      .toolbar {
        grid-template-columns: 1fr 1.4fr;
      }

      .benefits {
        grid-template-columns: 1fr 1fr;
      }

      .benefit:nth-child(2) { border-right: 0; }
      .benefit:nth-child(-n+2) { border-bottom: 1px solid rgba(255,255,255,.15); }
    }

    @media (max-width: 700px) {
      .portal-title {
        padding: 24px;
      }

      .company-logos {
        gap: 16px;
        padding: 18px;
      }

      .company-logos img {
        height: 48px;
        max-width: 43% !important;
      }

      .logo-divider { height: 52px; }

      .toolbar {
        grid-template-columns: 1fr;
        width: calc(100% - 22px);
        margin-top: 28px;
      }

      button { width: 100%; }

      .count-pill {
        margin-left: 14px;
      }

      .grid {
        width: calc(100% - 22px);
      }

      .benefits {
        grid-template-columns: 1fr;
      }

      .benefit,
      .benefit:nth-child(2) {
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,.15);
      }

      .benefit:last-child { border-bottom: 0; }
    }

  <script>
    "use strict";

    const grid = document.getElementById("stationGrid");
    const tagFilter = document.getElementById("tagFilter");
    const searchBox = document.getElementById("searchBox");
    const searchButton = document.getElementById("searchButton");
    const showAllButton = document.getElementById("showAllButton");
    const resultText = document.getElementById("resultText");

    let stations = [];

    function safeText(value) {
      return String(value ?? "").trim();
    }

    function normalize(value) {
      return safeText(value)
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
    }

    function isValidStation(item) {
      if (!item || typeof item !== "object") return false;

      const required = ["nombre", "url", "comunidad", "ciudad", "etiqueta"];
      if (!required.every(key => safeText(item[key]))) return false;

      try {
        const parsed = new URL(item.url, window.location.href);
        return ["http:", "https:"].includes(parsed.protocol);
      } catch {
        return false;
      }
    }

    async function loadStations() {
      try {
        const response = await fetch("./estaciones.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const json = await response.json();
        if (!Array.isArray(json)) {
          throw new Error("El JSON debe contener una lista.");
        }

        stations = json.filter(isValidStation);
      } catch (error) {
        console.warn(
          "No se pudo cargar estaciones.json; se muestran datos de ejemplo.",
          error
        );

        stations = JSON.parse(
          document.getElementById("fallbackData").textContent
        ).filter(isValidStation);
      }

      populateTags();
      applyFilters();
    }

    function populateTags() {
      const tags = [...new Set(stations.map(item => safeText(item.etiqueta)))]
        .sort((a, b) => a.localeCompare(b, "es", { sensitivity: "base" }));

      tagFilter.innerHTML = '<option value="">Todas las etiquetas</option>';

      for (const tag of tags) {
        const option = document.createElement("option");
        option.value = tag;
        option.textContent = tag;
        tagFilter.appendChild(option);
      }
    }

    function stationIcon() {
      return `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9">
          <path d="M6 21V4.7C6 3.8 6.8 3 7.7 3h6.6c.9 0 1.7.8 1.7 1.7V21"/>
          <path d="M8.5 6.5h5v4h-5zM4 21h14"/>
          <path d="M16 7h1.3c1 0 1.7.8 1.7 1.7V15c0 1.1.9 2 2 2"/>
        </svg>`;
    }

    function pinIcon() {
      return `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 10c0 5-8 11-8 11S4 15 4 10a8 8 0 1 1 16 0Z"/>
          <circle cx="12" cy="10" r="2.5"/>
        </svg>`;
    }

    function externalIcon() {
      return `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 5h5v5M13 11l6-6"/>
          <path d="M19 13v6H5V5h6"/>
        </svg>`;
    }


    /**
     * Devuelve un nombre de pestaña estable para cada estación.
     * Se puede definir manualmente en estaciones.json mediante "tabName".
     * Si no existe, se genera automáticamente a partir de la URL.
     */
    function getStationTabName(station) {
      if (safeText(station.tabName)) {
        return safeText(station.tabName)
          .replace(/[^a-zA-Z0-9_-]+/g, "_")
          .slice(0, 100);
      }

      const source = safeText(station.url) || safeText(station.nombre);
      let hash = 2166136261;

      for (let i = 0; i < source.length; i++) {
        hash ^= source.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }

      const readableName = normalize(station.nombre)
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "")
        .slice(0, 45);

      return `station_${readableName || "access"}_${(hash >>> 0).toString(16)}`;
    }

    /**
     * Abre la estación reutilizando la misma pestaña cuando fue abierta
     * anteriormente desde este portal.
     */
    function openStation(station) {
      const tabName = getStationTabName(station);

      // Recupera la pestaña si ya existe sin volver a navegar.
      const stationWindow = window.open("", tabName);

      if (!stationWindow) {
        alert("El navegador ha bloqueado la apertura de la pestaña.");
        return;
      }

      let shouldNavigate = false;

      try {
        shouldNavigate =
          stationWindow.location.href === "about:blank" ||
          stationWindow.location.href === "";
      } catch (e) {
        // Si es otro dominio ya está abierta: no recargar.
        shouldNavigate = false;
      }

      if (shouldNavigate) {
        stationWindow.location.replace(station.url);
      }

      try {
        stationWindow.focus();
      } catch (e) {}
    }
    function createCard(station, index) {
      const card = document.createElement("a");
      card.className = "station-card";
      card.href = station.url;
      card.rel = "noopener";

      card.addEventListener("click", event => {
        // Conserva los comportamientos especiales del navegador:
        // Ctrl/Cmd+clic, Shift+clic y botón central.
        if (
          event.button !== 0 ||
          event.ctrlKey ||
          event.metaKey ||
          event.shiftKey ||
          event.altKey
        ) {
          return;
        }

        event.preventDefault();
        openStation(station);
      });
      card.style.animationDelay = `${Math.min(index * 45, 360)}ms`;
      card.setAttribute(
        "aria-label",
        `Abrir o recuperar la pestaña de ${station.nombre}`
      );

      card.innerHTML = `
        <div class="station-head">
          <span class="station-icon">${stationIcon()}</span>
          <div>
            <h2></h2>
            <div class="location">
              <span>${pinIcon()}<b class="community"></b></span>
              <span>${pinIcon()}<b class="city"></b></span>
            </div>
          </div>
        </div>

        <div class="station-foot">
          <span class="tag"></span>
          <span class="open">Open ${externalIcon()}</span>
        </div>`;

      card.querySelector("h2").textContent = safeText(station.nombre);
      card.querySelector(".community").textContent = safeText(station.comunidad);
      card.querySelector(".city").textContent = safeText(station.ciudad);
      card.querySelector(".tag").textContent = safeText(station.etiqueta);

      return card;
    }

    function render(list) {
      grid.replaceChildren();

      if (!list.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No hay estaciones que coincidan con la búsqueda.";
        grid.appendChild(empty);
      } else {
        list.forEach((station, index) => {
          grid.appendChild(createCard(station, index));
        });
      }

      resultText.textContent =
        `Mostrando ${list.length} de ${stations.length} ` +
        `${stations.length === 1 ? "estación" : "estaciones"}`;
    }

    function applyFilters() {
      const selectedTag = normalize(tagFilter.value);
      const query = normalize(searchBox.value);

      const filtered = stations.filter(station => {
        const matchesTag =
          !selectedTag || normalize(station.etiqueta) === selectedTag;

        const searchable = [
          station.nombre,
          station.ciudad,
          station.comunidad,
          station.etiqueta
        ].map(normalize).join(" ");

        return matchesTag && (!query || searchable.includes(query));
      });

      render(filtered);
    }

    tagFilter.addEventListener("change", applyFilters);
    searchBox.addEventListener("input", applyFilters);
    searchButton.addEventListener("click", applyFilters);

    searchBox.addEventListener("keydown", event => {
      if (event.key === "Enter") applyFilters();
    });

    showAllButton.addEventListener("click", () => {
      tagFilter.value = "";
      searchBox.value = "";
      applyFilters();
      searchBox.focus();
    });

    loadStations();
  </script>
</body>
</html>
