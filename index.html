<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Portal empresarial de acceso a estaciones">
  <title>Station Access Portal</title>

  <style>
    :root {
      --bg: #07101d;
      --panel: rgba(10, 23, 40, .72);
      --panel-hover: rgba(18, 42, 70, .88);
      --border: rgba(255,255,255,.15);
      --text: #f5f8fb;
      --muted: #aab8c7;
      --accent: #3ad6a0;
      --accent-2: #59a8ff;
      --danger: #ff7f7f;
      --shadow: 0 18px 50px rgba(0,0,0,.28);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
                   "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(49,130,206,.18), transparent 36%),
        radial-gradient(circle at 85% 25%, rgba(58,214,160,.16), transparent 30%),
        linear-gradient(135deg, #050b14 0%, #0b1d31 52%, #07101d 100%);
      overflow-x: hidden;
    }

    /* Fondo dibujado dentro del propio HTML: call center + gasolinera */
    .background-art {
      position: fixed;
      inset: 0;
      z-index: -2;
      opacity: .22;
      filter: blur(5px);
      transform: scale(1.04);
      pointer-events: none;
    }

    .background-art svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .background-shade {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(4,10,18,.35), rgba(4,10,18,.82)),
        radial-gradient(circle at center, transparent 0 35%, rgba(4,10,18,.45) 100%);
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 72px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      min-width: 190px;
      height: 52px;
      padding: 0 18px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-weight: 900;
      letter-spacing: -.02em;
      color: #07101d;
      background: linear-gradient(135deg, var(--accent), #9df8d7);
      box-shadow: 0 12px 32px rgba(58,214,160,.23);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 3.5rem);
      line-height: 1;
      letter-spacing: -.04em;
    }

    .subtitle {
      margin: 9px 0 0;
      color: var(--muted);
      max-width: 680px;
      line-height: 1.55;
    }

    .status {
      white-space: nowrap;
      color: var(--muted);
      font-size: .92rem;
      padding: 9px 13px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(5, 13, 23, .55);
      backdrop-filter: blur(14px);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(210px, .8fr) minmax(260px, 1.4fr) auto;
      gap: 12px;
      align-items: end;
      padding: 18px;
      margin-bottom: 22px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(7, 16, 29, .62);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .field label {
      display: block;
      margin: 0 0 7px 3px;
      color: var(--muted);
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    select, input, button {
      min-height: 46px;
      border-radius: 13px;
      border: 1px solid var(--border);
      font: inherit;
    }

    select, input {
      width: 100%;
      padding: 0 42px 0 14px;
      color: var(--text);
      background: #0b1b2d;
      outline: none;
    }

    select { cursor: pointer; }
    input { padding-right: 14px; }
    input::placeholder { color: #72869b; }

    select:focus, input:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 4px rgba(89,168,255,.16);
    }

    button {
      padding: 0 18px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }

    button:hover { transform: translateY(-2px); }
    button:active { transform: translateY(0); }

    .btn-primary {
      color: #06101c;
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent), #86f2cb);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255,255,255,.06);
    }

    .summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 0 3px 14px;
      color: var(--muted);
    }

    .summary strong { color: var(--text); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 17px;
    }

    .station-card {
      position: relative;
      min-height: 210px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      padding: 21px;
      color: inherit;
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background:
        linear-gradient(145deg, rgba(255,255,255,.08), rgba(255,255,255,.025)),
        var(--panel);
      backdrop-filter: blur(15px);
      box-shadow: 0 14px 35px rgba(0,0,0,.18);
      transition: transform .2s ease, border-color .2s ease, background .2s ease,
                  box-shadow .2s ease;
      animation: reveal .45s ease both;
    }

    .station-card::after {
      content: "";
      position: absolute;
      width: 110px;
      height: 110px;
      right: -40px;
      bottom: -45px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(58,214,160,.25), transparent 70%);
    }

    .station-card:hover {
      transform: translateY(-6px);
      border-color: rgba(58,214,160,.62);
      background:
        linear-gradient(145deg, rgba(255,255,255,.11), rgba(255,255,255,.045)),
        var(--panel-hover);
      box-shadow: 0 24px 50px rgba(0,0,0,.30);
    }

    .station-card:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 4px;
    }

    .tag {
      width: fit-content;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: .76rem;
      font-weight: 850;
      color: #06131c;
      background: linear-gradient(135deg, var(--accent), #b8ffe6);
    }

    .station-card h2 {
      margin: 17px 0 8px;
      font-size: 1.3rem;
      line-height: 1.2;
    }

    .location {
      display: flex;
      gap: 7px;
      color: var(--muted);
      line-height: 1.45;
    }

    .open-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 24px;
      font-weight: 800;
      color: #d9eaff;
    }

    .arrow {
      font-size: 1.25rem;
      transition: transform .2s ease;
    }

    .station-card:hover .arrow { transform: translate(3px, -3px); }

    .empty, .error {
      grid-column: 1 / -1;
      padding: 34px 20px;
      text-align: center;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: rgba(7,16,29,.58);
      color: var(--muted);
    }

    .error { color: var(--danger); }

    footer {
      margin-top: 30px;
      color: #8394a8;
      text-align: center;
      font-size: .88rem;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 720px) {
      .shell { padding-top: 25px; }
      header { align-items: flex-start; flex-direction: column; }
      .toolbar { grid-template-columns: 1fr; }
      button { width: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>

<body>

  </div>
  <div class="background-shade" aria-hidden="true"></div>

  <main class="shell">
    <header>
      <div class="brand">
        <div class="logo">Station Access Portal</div>
        <div>
          <h1>Enterprise Station Gateway</h1>
          <p class="subtitle">
            Busca por nombre, ciudad, comunidad o etiqueta. Cada tarjeta abre
            la aplicación de la estación en una pestaña nueva.
          </p>
        </div>
      </div>
      <div class="status" id="loadStatus">Cargando datos…</div>
    </header>

    <section class="toolbar" aria-label="Filtros">
      <div class="field">
        <label for="tagFilter">Etiqueta identificativa</label>
        <select id="tagFilter">
          <option value="">Todas las etiquetas</option>
        </select>
      </div>
      <div class="field">
        <label for="searchBox">Buscar estación</label>
        <input id="searchBox" type="search" placeholder="Nombre, ciudad, comunidad o etiqueta">
      </div>
      <button id="showAllButton" class="btn-secondary" type="button">Mostrar todos</button>
    </section>

    <div class="summary" aria-live="polite">
      <span id="resultText">Preparando estaciones…</span>
      <span id="activeFilter"></span>
    </div>

    <section id="stationGrid" class="grid" aria-label="Listado de estaciones"></section>

    <footer>
      Portal empresarial · Datos cargados desde <code>estaciones.json</code>
    </footer>
  </main>

  <!-- Datos de respaldo: permiten ver la página incluso si se abre el HTML sin servidor. -->
  <script id="fallbackData" type="application/json">
[
  {
    "nombre": "Estación Barcelona Norte",
    "url": "https://www.example.com/barcelona-norte",
    "comunidad": "Cataluña",
    "ciudad": "Barcelona",
    "etiqueta": "Soporte 24h"
  },
  {
    "nombre": "Estación Vilafranca",
    "url": "https://www.example.com/vilafranca",
    "comunidad": "Cataluña",
    "ciudad": "Vilafranca del Penedès",
    "etiqueta": "Loxone"
  },
  {
    "nombre": "Estación Madrid Centro",
    "url": "https://www.example.com/madrid-centro",
    "comunidad": "Comunidad de Madrid",
    "ciudad": "Madrid",
    "etiqueta": "Soporte 24h"
  }
]
  </script>

  <script>
    "use strict";

    const grid = document.getElementById("stationGrid");
    const tagFilter = document.getElementById("tagFilter");
    const searchBox = document.getElementById("searchBox");
    const showAllButton = document.getElementById("showAllButton");
    const resultText = document.getElementById("resultText");
    const activeFilter = document.getElementById("activeFilter");
    const loadStatus = document.getElementById("loadStatus");

    let stations = [];

    function safeText(value) {
      return String(value ?? "").trim();
    }

    function isValidStation(item) {
      if (!item || typeof item !== "object") return false;

      const required = ["nombre", "url", "comunidad", "ciudad", "etiqueta"];
      if (!required.every(key => safeText(item[key]))) return false;

      try {
        const parsed = new URL(item.url, window.location.href);
        return ["http:", "https:"].includes(parsed.protocol);
      } catch {
        return false;
      }
    }

    async function loadStations() {
      try {
        const response = await fetch("./estaciones.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const json = await response.json();
        if (!Array.isArray(json)) throw new Error("El JSON debe ser una lista.");

        stations = json.filter(isValidStation);
        loadStatus.textContent = "JSON cargado";
      } catch (error) {
        console.warn("No se pudo cargar estaciones.json. Se usan datos de respaldo.", error);
        const fallback = JSON.parse(document.getElementById("fallbackData").textContent);
        stations = fallback.filter(isValidStation);
        loadStatus.textContent = "Datos de demostración";
      }

      populateTags();
      renderStations(stations);
    }

    function populateTags() {
      const tags = [...new Set(stations.map(station => safeText(station.etiqueta)))]
        .sort((a, b) => a.localeCompare(b, "es", { sensitivity: "base" }));

      tagFilter.innerHTML = '<option value="">Todas las etiquetas</option>';

      for (const tag of tags) {
        const option = document.createElement("option");
        option.value = tag;
        option.textContent = tag;
        tagFilter.appendChild(option);
      }
    }

    function createStationCard(station, index) {
      const card = document.createElement("a");
      card.className = "station-card";
      card.href = station.url;
      card.target = "_blank";
      card.rel = "noopener noreferrer";
      card.style.animationDelay = `${Math.min(index * 45, 360)}ms`;
      card.setAttribute(
        "aria-label",
        `Abrir ${station.nombre}, ${station.ciudad}, en una pestaña nueva`
      );

      const top = document.createElement("div");
      const tag = document.createElement("span");
      const title = document.createElement("h2");
      const location = document.createElement("div");
      const bottom = document.createElement("div");
      const arrow = document.createElement("span");

      tag.className = "tag";
      tag.textContent = safeText(station.etiqueta);

      title.textContent = safeText(station.nombre);

      location.className = "location";
      location.textContent = `⌖ ${safeText(station.ciudad)} · ${safeText(station.comunidad)}`;

      bottom.className = "open-label";
      bottom.append("Abrir estación");

      arrow.className = "arrow";
      arrow.setAttribute("aria-hidden", "true");
      arrow.textContent = "↗";
      bottom.appendChild(arrow);

      top.append(tag, title, location);
      card.append(top, bottom);

      return card;
    }

    function renderStations(list, selectedTag = "") {
      grid.replaceChildren();

      if (!list.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No hay estaciones que coincidan con este filtro.";
        grid.appendChild(empty);
      } else {
        list.forEach((station, index) => {
          grid.appendChild(createStationCard(station, index));
        });
      }

      resultText.innerHTML =
        `<strong>${list.length}</strong> ${list.length === 1 ? "estación mostrada" : "estaciones mostradas"}`;

      activeFilter.textContent = selectedTag ? selectedTag : "Sin filtro";
    }

    function applyFilter() {
      const selectedTag = tagFilter.value;
      const term = safeText(searchBox.value).toLocaleLowerCase("es");

      const filtered = stations.filter(station => {
        const matchesTag = !selectedTag || safeText(station.etiqueta) === selectedTag;
        const searchable = [
          station.nombre, station.ciudad, station.comunidad, station.etiqueta
        ].map(safeText).join(" ").toLocaleLowerCase("es");
        const matchesSearch = !term || searchable.includes(term);
        return matchesTag && matchesSearch;
      });

      const label = [selectedTag, term ? `Búsqueda: ${searchBox.value.trim()}` : ""]
        .filter(Boolean).join(" · ");
      renderStations(filtered, label);
    }

    tagFilter.addEventListener("change", applyFilter);
    searchBox.addEventListener("input", applyFilter);

    showAllButton.addEventListener("click", () => {
      tagFilter.value = "";
      searchBox.value = "";
      renderStations(stations);
    });

    loadStations();
  </script>
</body>
</html>
