<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Portal empresarial de acceso a estaciones">
  <title>Station Access Portal</title>

  <style>
    :root {
      --navy: #081326;
      --navy-2: #142238;
      --red: #df002b;
      --red-dark: #b80023;
      --green: #00e8ba;
      --white: #ffffff;
      --ink: #0d1729;
      --muted: #647084;
      --glass: rgba(255,255,255,.78);
      --glass-dark: rgba(8,19,38,.82);
      --line: rgba(255,255,255,.34);
      --shadow: 0 22px 55px rgba(4,15,30,.28);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
                   "Segoe UI", sans-serif;
      background: #0a1628;
      overflow-x: hidden;
    }

    .background {
      position: fixed;
      inset: 0;
      z-index: -3;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(7,18,34,.88) 0 47%, rgba(7,18,34,.28) 63%, rgba(7,18,34,.42)),
        linear-gradient(180deg, rgba(4,12,24,.15), rgba(4,12,24,.65));
    }

    .background svg {
      width: 100%;
      height: 100%;
      display: block;
      filter: blur(2px);
      transform: scale(1.025);
    }

    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(3,11,22,.16), rgba(3,11,22,.56)),
        radial-gradient(circle at 70% 35%, transparent 0 26%, rgba(3,11,22,.18) 72%);
    }

    .page {
      width: min(1440px, calc(100% - 34px));
      margin: 0 auto;
      padding: 24px 0 34px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(430px, 1fr) auto;
      align-items: center;
      min-height: 124px;
      overflow: hidden;
      border-radius: 0 0 26px 26px;
      border-bottom: 2px solid var(--red);
      background: linear-gradient(90deg, rgba(7,19,38,.97), rgba(21,35,55,.91) 50%, rgba(248,250,254,.93) 78%);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
    }

    .portal-brand {
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 22px 34px;
      color: white;
    }

    .portal-mark {
      width: 72px;
      height: 72px;
      flex: 0 0 auto;
      filter: drop-shadow(0 10px 18px rgba(223,0,43,.24));
    }

    .portal-mark svg {
      width: 100%;
      height: 100%;
    }

    .portal-brand h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.15rem);
      line-height: .98;
      letter-spacing: -.045em;
    }

    .portal-brand p {
      margin: 11px 0 0;
      color: rgba(255,255,255,.74);
      font-size: clamp(.95rem, 1.7vw, 1.2rem);
    }

    .company-logos {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 28px;
      min-width: 510px;
      padding: 22px 38px;
    }

    .company-logos img {
      display: block;
      width: auto;
      object-fit: contain;
    }

    .company-logos .madic {
      height: 72px;
      max-width: 270px;
    }

    .company-logos .espic {
      height: 72px;
      max-width: 260px;
    }

    .divider {
      width: 1px;
      height: 72px;
      background: rgba(13,23,41,.32);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(210px, .75fr) minmax(310px, 2fr) auto auto;
      gap: 15px;
      align-items: center;
      margin: 56px auto 24px;
      padding: 20px;
      width: min(1210px, calc(100% - 32px));
      border: 1px solid rgba(255,255,255,.66);
      border-radius: 20px;
      background: rgba(255,255,255,.74);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
    }

    .control {
      position: relative;
    }

    .control svg {
      position: absolute;
      left: 17px;
      top: 50%;
      width: 22px;
      height: 22px;
      transform: translateY(-50%);
      color: #344159;
      pointer-events: none;
    }

    select, input, button {
      min-height: 58px;
      border-radius: 12px;
      font: inherit;
    }

    select, input {
      width: 100%;
      border: 1px solid rgba(13,23,41,.13);
      background: rgba(255,255,255,.95);
      color: var(--ink);
      outline: none;
      box-shadow: 0 5px 13px rgba(23,35,53,.07);
    }

    select {
      padding: 0 42px 0 50px;
      appearance: none;
      cursor: pointer;
    }

    input {
      padding: 0 18px 0 53px;
    }

    input::placeholder { color: #7d8797; }

    select:focus, input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 4px rgba(223,0,43,.11);
    }

    button {
      padding: 0 25px;
      border: 0;
      font-weight: 800;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .btn-search {
      min-width: 145px;
      color: white;
      background: linear-gradient(135deg, var(--red), #ef2349);
      box-shadow: 0 12px 24px rgba(223,0,43,.25);
    }

    .btn-search:hover {
      background: linear-gradient(135deg, var(--red-dark), var(--red));
    }

    .btn-all {
      min-width: 150px;
      color: var(--ink);
      background: rgba(255,255,255,.95);
      box-shadow: 0 8px 18px rgba(23,35,53,.11);
    }

    .count-pill {
      width: fit-content;
      margin: 0 0 24px max(40px, calc((100% - min(1280px, 100%)) / 2));
      padding: 12px 18px;
      color: white;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 13px;
      background: rgba(7,19,38,.78);
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 26px rgba(4,15,30,.22);
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 18px;
      width: min(1320px, calc(100% - 32px));
      margin: 0 auto;
    }

    .station-card {
      position: relative;
      min-height: 196px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 22px;
      overflow: hidden;
      color: var(--ink);
      text-decoration: none;
      border: 1px solid rgba(255,255,255,.8);
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(255,255,255,.96), rgba(244,247,251,.89));
      backdrop-filter: blur(15px);
      box-shadow: 0 18px 34px rgba(3,13,27,.22);
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      animation: reveal .45s ease both;
    }

    .station-card:hover {
      transform: translateY(-6px);
      border-color: rgba(223,0,43,.35);
      box-shadow: 0 26px 46px rgba(3,13,27,.31);
    }

    .station-card:focus-visible {
      outline: 3px solid var(--red);
      outline-offset: 4px;
    }

    .station-head {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 16px;
      align-items: start;
    }

    .station-icon {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: white;
      background: linear-gradient(145deg, var(--red), #f11c43);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.25), 0 9px 18px rgba(223,0,43,.18);
    }

    .station-icon svg {
      width: 29px;
      height: 29px;
    }

    .station-card h2 {
      margin: 2px 0 10px;
      font-size: 1.12rem;
      line-height: 1.25;
    }

    .location {
      display: grid;
      gap: 7px;
      color: #39475c;
      font-size: .94rem;
    }

    .location span {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .location svg {
      width: 15px;
      height: 15px;
      flex: 0 0 auto;
    }

    .station-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      margin-top: 24px;
    }

    .tag {
      max-width: 68%;
      padding: 7px 11px;
      overflow: hidden;
      color: var(--red-dark);
      font-size: .78rem;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-radius: 8px;
      background: rgba(223,0,43,.10);
    }

    .open {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--red);
      font-weight: 850;
      white-space: nowrap;
    }

    .open svg {
      width: 16px;
      height: 16px;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 42px 20px;
      text-align: center;
      color: white;
      border: 1px dashed rgba(255,255,255,.38);
      border-radius: 18px;
      background: rgba(7,19,38,.70);
      backdrop-filter: blur(14px);
    }

    .benefits {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      width: min(1400px, calc(100% - 10px));
      margin: 34px auto 0;
      overflow: hidden;
      color: white;
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 24px;
      background: rgba(7,19,38,.82);
      backdrop-filter: blur(17px);
      box-shadow: var(--shadow);
    }

    .benefit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      min-height: 112px;
      padding: 18px 24px;
      border-right: 1px solid rgba(255,255,255,.15);
    }

    .benefit:last-child { border-right: 0; }

    .benefit-icon {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      color: var(--red);
    }

    .benefit-icon svg {
      width: 42px;
      height: 42px;
    }

    .benefit strong {
      display: block;
      margin-bottom: 5px;
      font-size: 1rem;
    }

    .benefit small {
      color: rgba(255,255,255,.68);
      font-size: .83rem;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1050px) {
      .topbar {
        grid-template-columns: 1fr;
        background: linear-gradient(180deg, rgba(7,19,38,.97) 0 57%, rgba(248,250,254,.94) 57%);
      }

      .company-logos {
        justify-content: center;
        min-width: 0;
      }

      .toolbar {
        grid-template-columns: 1fr 1.5fr;
      }

      .benefits {
        grid-template-columns: 1fr 1fr;
      }

      .benefit:nth-child(2) {
        border-right: 0;
      }

      .benefit:nth-child(-n+2) {
        border-bottom: 1px solid rgba(255,255,255,.15);
      }
    }

    @media (max-width: 680px) {
      .page {
        width: min(100% - 18px, 1440px);
        padding-top: 9px;
      }

      .portal-brand {
        align-items: flex-start;
        padding: 22px;
      }

      .portal-mark {
        width: 54px;
        height: 54px;
      }

      .company-logos {
        gap: 17px;
        padding: 18px;
      }

      .company-logos .madic,
      .company-logos .espic {
        height: 48px;
        max-width: 43%;
      }

      .divider {
        height: 50px;
      }

      .toolbar {
        grid-template-columns: 1fr;
        margin-top: 28px;
      }

      button {
        width: 100%;
      }

      .count-pill {
        margin-left: 16px;
      }

      .benefits {
        grid-template-columns: 1fr;
      }

      .benefit,
      .benefit:nth-child(2) {
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,.15);
      }

      .benefit:last-child {
        border-bottom: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>

  <script id="fallbackData" type="application/json">
[
  {
    "nombre": "Estación Barcelona Norte",
    "url": "https://www.example.com/barcelona-norte",
    "comunidad": "Cataluña",
    "ciudad": "Barcelona",
    "etiqueta": "Soporte"
  },
  {
    "nombre": "Estación Vilafranca",
    "url": "https://www.example.com/vilafranca",
    "comunidad": "Cataluña",
    "ciudad": "Vilafranca del Penedès",
    "etiqueta": "Loxone"
  },
  {
    "nombre": "Estación Madrid Centro",
    "url": "https://www.example.com/madrid-centro",
    "comunidad": "Comunidad de Madrid",
    "ciudad": "Madrid",
    "etiqueta": "Mantenimiento"
  }
]
  </script>

  <script>
    "use strict";

    const grid = document.getElementById("stationGrid");
    const tagFilter = document.getElementById("tagFilter");
    const searchBox = document.getElementById("searchBox");
    const searchButton = document.getElementById("searchButton");
    const showAllButton = document.getElementById("showAllButton");
    const resultText = document.getElementById("resultText");

    let stations = [];

    function safeText(value) {
      return String(value ?? "").trim();
    }

    function normalize(value) {
      return safeText(value)
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
    }

    function isValidStation(item) {
      if (!item || typeof item !== "object") return false;
      const required = ["nombre", "url", "comunidad", "ciudad", "etiqueta"];
      if (!required.every(key => safeText(item[key]))) return false;

      try {
        const parsed = new URL(item.url, window.location.href);
        return ["http:", "https:"].includes(parsed.protocol);
      } catch {
        return false;
      }
    }

    async function loadStations() {
      try {
        const response = await fetch("./estaciones.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const json = await response.json();
        if (!Array.isArray(json)) throw new Error("El JSON debe contener una lista.");

        stations = json.filter(isValidStation);
      } catch (error) {
        console.warn("No se pudo cargar estaciones.json; se muestran datos de ejemplo.", error);
        stations = JSON.parse(
          document.getElementById("fallbackData").textContent
        ).filter(isValidStation);
      }

      populateTags();
      applyFilters();
    }

    function populateTags() {
      const tags = [...new Set(stations.map(item => safeText(item.etiqueta)))]
        .sort((a, b) => a.localeCompare(b, "es", { sensitivity: "base" }));

      tagFilter.innerHTML = '<option value="">Todas las etiquetas</option>';

      for (const tag of tags) {
        const option = document.createElement("option");
        option.value = tag;
        option.textContent = tag;
        tagFilter.appendChild(option);
      }
    }

    function stationIcon() {
      return `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9">
          <path d="M6 21V4.7C6 3.8 6.8 3 7.7 3h6.6c.9 0 1.7.8 1.7 1.7V21"/>
          <path d="M8.5 6.5h5v4h-5zM4 21h14"/>
          <path d="M16 7h1.3c1 0 1.7.8 1.7 1.7V15c0 1.1.9 2 2 2"/>
        </svg>`;
    }

    function pinIcon() {
      return `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 10c0 5-8 11-8 11S4 15 4 10a8 8 0 1 1 16 0Z"/>
          <circle cx="12" cy="10" r="2.5"/>
        </svg>`;
    }

    function externalIcon() {
      return `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 5h5v5M13 11l6-6"/>
          <path d="M19 13v6H5V5h6"/>
        </svg>`;
    }

    function createCard(station, index) {
      const card = document.createElement("a");
      card.className = "station-card";
      card.href = station.url;
      card.target = "_blank";
      card.rel = "noopener noreferrer";
      card.style.animationDelay = `${Math.min(index * 45, 360)}ms`;
      card.setAttribute("aria-label", `Abrir ${station.nombre} en una pestaña nueva`);

      card.innerHTML = `
        <div class="station-head">
          <span class="station-icon">${stationIcon()}</span>
          <div>
            <h2></h2>
            <div class="location">
              <span>${pinIcon()}<b class="community"></b></span>
              <span>${pinIcon()}<b class="city"></b></span>
            </div>
          </div>
        </div>
        <div class="station-foot">
          <span class="tag"></span>
          <span class="open">Abrir ${externalIcon()}</span>
        </div>`;

      card.querySelector("h2").textContent = safeText(station.nombre);
      card.querySelector(".community").textContent = safeText(station.comunidad);
      card.querySelector(".city").textContent = safeText(station.ciudad);
      card.querySelector(".tag").textContent = safeText(station.etiqueta);

      return card;
    }

    function render(list) {
      grid.replaceChildren();

      if (!list.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No hay estaciones que coincidan con la búsqueda.";
        grid.appendChild(empty);
      } else {
        list.forEach((station, index) => grid.appendChild(createCard(station, index)));
      }

      resultText.textContent =
        `Mostrando ${list.length} de ${stations.length} ${stations.length === 1 ? "estación" : "estaciones"}`;
    }

    function applyFilters() {
      const selectedTag = normalize(tagFilter.value);
      const query = normalize(searchBox.value);

      const filtered = stations.filter(station => {
        const matchesTag = !selectedTag || normalize(station.etiqueta) === selectedTag;
        const searchable = [
          station.nombre,
          station.ciudad,
          station.comunidad,
          station.etiqueta
        ].map(normalize).join(" ");

        return matchesTag && (!query || searchable.includes(query));
      });

      render(filtered);
    }

    tagFilter.addEventListener("change", applyFilters);
    searchBox.addEventListener("input", applyFilters);
    searchButton.addEventListener("click", applyFilters);
    searchBox.addEventListener("keydown", event => {
      if (event.key === "Enter") applyFilters();
    });

    showAllButton.addEventListener("click", () => {
      tagFilter.value = "";
      searchBox.value = "";
      applyFilters();
      searchBox.focus();
    });

    loadStations();
  </script>
